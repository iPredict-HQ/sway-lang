<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Chart icon -->
  <g transform="translate(250, 140)" opacity="0.3">
    <rect x="0" y="60" width="20" height="60" rx="4" fill="#6366f1"/>
    <rect x="30" y="30" width="20" height="90" rx="4" fill="#818cf8"/>
    <rect x="60" y="0" width="20" height="120" rx="4" fill="#a5b4fc"/>
    <rect x="90" y="45" width="20" height="75" rx="4" fill="#6366f1"/>
  </g>
  <text x="300" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#4b5563">Prediction Market</text>
  <text x="300" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6b7280">iPredict</text>
</svg>
